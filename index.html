<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>五子连珠 - 马年大吉</title>
    <link rel="manifest" href="manifest.json">
    <meta name="version" content="1.7.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <!-- 顶部信息栏 -->
        <div class="header">
            <div class="score-section">
                <span class="label">分数</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="title">五子连珠</div>
            <div class="version">v1.7.1</div>
            <div class="score-section">
                <span class="label">最高分</span>
                <span id="high-score" class="value">0</span>
            </div>
        </div>

        <!-- 游戏棋盘区域 -->
        <div class="board-container">
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- 下回合预览 -->
        <div class="next-balls-section">
            <span class="label">下回合:</span>
            <div id="next-balls" class="preview-balls">
                <div class="preview-slot"></div>
                <div class="preview-slot"></div>
                <div class="preview-slot"></div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button id="btn-new-game" class="btn primary">新游戏</button>
            <button id="btn-undo" class="btn" disabled>撤销</button>
            <button id="btn-hint" class="btn" disabled>提示</button>
            <button id="btn-settings" class="btn">⚙️</button>
        </div>
    </div>

    <!-- 设置面板 -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content settings-panel">
            <h2>⚙️ 游戏设置</h2>
            
            <!-- 皮肤选择 -->
            <div class="settings-section">
                <h3>🎨 皮肤主题</h3>
                <div id="skin-selector" class="skin-grid">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <!-- 音效开关 -->
            <div class="settings-section">
                <h3>🔊 音效设置</h3>
                <label class="toggle-switch">
                    <input type="checkbox" id="sound-toggle" checked>
                    <span class="toggle-slider"></span>
                    <span class="toggle-label">启用音效</span>
                </label>
            </div>
            
            <!-- 难度选择 -->
            <div class="settings-section">
                <h3>🎮 难度设置</h3>
                <div class="difficulty-buttons">
                    <button class="diff-btn active" data-colors="5">简单 (5色)</button>
                    <button class="diff-btn" data-colors="6">中等 (6色)</button>
                    <button class="diff-btn" data-colors="7">困难 (7色)</button>
                </div>
            </div>
            
            <div class="settings-actions">
                <button id="btn-close-settings" class="btn primary">完成</button>
            </div>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <p class="final-score">最终得分: <span id="final-score">0</span></p>
            <button id="btn-restart" class="btn primary">再来一局</button>
        </div>
    </div>

    <script src="dist/game.js?v=3"></script>
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then((registration) => {
                        console.log('SW registered:', registration);
                    })
                    .catch((error) => {
                        console.log('SW registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
